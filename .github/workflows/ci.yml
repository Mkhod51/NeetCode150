name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run every solution file in the category folders
        run: |
          set -u
          CATEGORIES="arrays-hashing two-pointers sliding-window stack binary-search linked-list trees tries heap-priority-queue backtracking graphs advanced-graphs one-d-dp two-d-dp greedy intervals math-geometry bit-manipulation"
          fail=0
          for c in $CATEGORIES; do
            for f in "$c"/*.py; do
              [ -e "$f" ] || continue
              echo "running $f"
              if ! python "$f"; then
                echo "::error file=$f::solution file exited non-zero"
                fail=1
              fi
            done
          done
          exit $fail

      - name: README PROGRESS/REVISIT is in sync
        run: python scripts/progress.py --check
