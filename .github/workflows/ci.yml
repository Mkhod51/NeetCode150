name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run every solution file in the category folders
        run: |
          set -u
          # Single source of truth for category folders: the canonical module.
          CATEGORIES=$(python -c 'import sys; sys.path.insert(0, "scripts"); from lib.neetcode150 import CATEGORY_ORDER; print(" ".join(f for f, _ in CATEGORY_ORDER))')
          if [ -z "$CATEGORIES" ]; then
            echo "::error::could not derive category folders from scripts/lib/neetcode150.py"
            exit 1
          fi
          fail=0
          for c in $CATEGORIES; do
            for f in "$c"/*.py; do
              [ -e "$f" ] || continue
              echo "running $f"
              if ! python "$f"; then
                echo "::error file=$f::solution file exited non-zero"
                fail=1
              fi
            done
          done
          exit $fail

      - name: README PROGRESS/REVISIT is in sync
        run: python scripts/progress.py --check
